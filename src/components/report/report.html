<div class="report-page">
  <section class="hero">
    <p class="eyebrow">Report Scam</p>
    <h1>Submit a scam report</h1>
    <p>Tell us about the suspicious message, website, or activity so ScamStop can learn and protect more users.</p>
  </section>

  <form class="report-form" (submit)="submitReport(); $event.preventDefault();">
    <label for="report-text">Describe the scam</label>
    <textarea
      id="report-text"
      placeholder="Paste the suspicious message, URL, or scam details here"
      [value]="reportText()"
      (input)="reportText.set($any($event.target).value)"
      rows="10"
      autocomplete="off"
    ></textarea>

    <div class="actions">
      <button type="submit" [disabled]="submitting() || !reportText().trim()">
        {{ submitting() ? 'Submitting...' : 'Submit report' }}
      </button>
    </div>

    <p *ngIf="successMessage()" class="notice success">{{ successMessage() }}</p>
    <p *ngIf="errorMessage()" class="notice error">{{ errorMessage() }}</p>

    <p class="hint">Your report helps improve ScamStop and can be used to refine scam detection models.</p>

  </form>
</div>
