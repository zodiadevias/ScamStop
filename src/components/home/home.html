<div class="home-page">
    @if(isScanning()) {
        <div class="shield">
            <img src="/assets/img/shield_on.svg" [class.shield-animate]="animateShield()" (animationend)="onShieldAnimationEnd()">
            <p>Real-time Scan is ON</p>
            <button (click)="toggleScanning()" class="btn1">Turn OFF</button>
        </div>
    }

    @else {
        <div class="shield">
            <img src="/assets/img/shield_off.svg" [class.shield-animate]="animateShield()" (animationend)="onShieldAnimationEnd()">
            <p>Real-time Scan is OFF</p>
            <button (click)="toggleScanning()" class="btn1">Turn ON</button>
        </div>
    }

</div>

<div class="home-grid">
    <div class="grid-card">
        <h3>Scanned</h3>
        <p >{{totalScanned}}</p>
    </div>
    <div class="grid-card">
        <h3>Flagged</h3>
        <p>{{totalFlagged}}</p>
    </div>
    <div class="grid-card">
        <h3>Safe</h3>
        <p>{{totalSafe}}</p>
    </div>
    <div class="grid-card full-width">
        <h3>Recent Detections</h3>
        <p class="recent">Detected content will be highlighted on web pages and stored in the extension history for review.</p>
    </div>
</div>
