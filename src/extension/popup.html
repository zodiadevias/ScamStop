<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamStop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 350px;
            min-height: 500px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        .header {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #e94560;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .section {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e94560;
        }

        .blacklist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .blacklist-number {
            font-size: 13px;
        }

        .blacklist-remove {
            background: none;
            border: none;
            color: #e94560;
            cursor: pointer;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #d63850;
        }

        .btn-secondary {
            background: #333;
            color: white;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .traffic-light {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .light {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .light-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .light-circle.red {
            background: #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        .light-circle.yellow {
            background: #ffbb33;
            box-shadow: 0 0 20px rgba(255, 187, 51, 0.5);
        }

        .light-circle.green {
            background: #00C851;
            box-shadow: 0 0 20px rgba(0, 200, 81, 0.5);
        }

        .light-label {
            font-size: 11px;
            color: #888;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 13px;
        }

        .footer {
            padding: 15px;
            text-align: center;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ ScamStop</h1>
        <p>Your protection against scams</p>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="detectionCount">0</div>
            <div class="stat-label">Detections</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="reportCount">0</div>
            <div class="stat-label">Reports Sent</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="blacklistCount">0</div>
            <div class="stat-label">Blacklisted</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">🚦 Scam Status</div>
        <div class="traffic-light">
            <div class="light">
                <div class="light-circle red">🔴</div>
                <span class="light-label">High Risk</span>
            </div>
            <div class="light">
                <div class="light-circle yellow">🟡</div>
                <span class="light-label">Caution</span>
            </div>
            <div class="light">
                <div class="light-circle green">🟢</div>
                <span class="light-label">Safe</span>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">📋 Scammer Blacklist</div>
        <div id="blacklistContainer">
            <div class="empty-state">No blacklisted numbers yet</div>
        </div>
    </div>

    <div class="section">
        <button class="btn btn-primary" id="syncBtn">🔄 Sync with ScamStop App</button>
        <button class="btn btn-secondary" id="clearBtn">🗑️ Clear All Data</button>
    </div>

    <div class="footer">
        ScamStop v1.0.0 | Protecting Olongapo City
    </div>

    <script src="popup.js"></script>
</body>
</html>
