services:
  - type: web
    name: scamstop-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      # Paste the entire contents of serviceAccountKey.json as the value
      - key: FIREBASE_KEY_JSON
        sync: false
